<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victim Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .victim-text {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }
        
        .counter-number {
            font-size: 5rem;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin: 20px 0;
        }
        
        .instruction {
            font-size: 1.2rem;
            color: #ffffff;
            margin-top: 30px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="victim-text">You are victim</div>
        <div class="counter-number" id="counter">1</div>
        <div class="instruction">Refresh to increment</div>
    </div>

    <script>
        // Initialize counter on page load
        function initializeCounter() {
            // Get current counter value from localStorage
            let count = localStorage.getItem('victimCounter');
            
            if (count === null) {
                count = 1;
            } else {
                count = parseInt(count) + 1;
            }
            
            // Store updated counter
            localStorage.setItem('victimCounter', count);
            
            // Display counter
            document.getElementById('counter').textContent = count;
        }
        
        // Run on page load
        window.addEventListener('load', initializeCounter);
    </script>
</body>
</html>
